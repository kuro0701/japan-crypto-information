services:
  - type: web
    name: japan-crypto-information
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: SITE_ORIGIN
        value: https://get-crypto.org
      - key: LEGACY_HOSTS
        value: japan-crypto-information.onrender.com
      - key: SNAPSHOT_STORAGE
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
      - key: GOOGLE_SHEETS_SHEET_NAME
        value: app_state_snapshots
