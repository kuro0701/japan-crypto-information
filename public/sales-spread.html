<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>販売所スプレッド | Japan クリプト インフォメーション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="terminal-body bg-gray-950 text-gray-200 min-h-screen">
  <a href="#main" class="sr-only skip-link">メインコンテンツへスキップ</a>
  <header class="topbar px-6 py-3">
    <div class="brand-cluster">
      <div class="brand-mark" aria-hidden="true">₿</div>
      <div class="brand-copy min-w-0">
        <h1 class="page-title">Japan クリプト インフォメーション</h1>
        <div class="brand-subtitle">国内取引所 販売所スプレッド</div>
      </div>
    </div>
    <nav class="nav-menu" aria-label="ページ間ナビゲーション">
      <a class="nav-link" href="/">板シミュレーター</a>
      <a class="nav-link" href="/volume-share">出来高シェア</a>
      <a class="nav-link is-active" href="/sales-spread" aria-current="page">販売所スプレッド</a>
    </nav>
    <div class="status-cluster" role="status" aria-live="polite" aria-atomic="true"><span class="sr-only">接続状態: ライブデータ取得中</span><span class="badge badge--live">LIVE</span><span id="spread-status" class="status-text">読み込み中</span><span class="text-xs text-gray-600 ml-2">更新: <span id="spread-updated-at" class="text-gray-400">-</span></span></div>
  </header>

  <main id="main" class="dashboard-shell flex flex-col gap-4 p-4 max-w-[1920px] mx-auto">
    <section class="panel panel--dense">
      <div class="panel-title-row mb-4"><div><h2 class="panel-title">販売所スプレッド</h2><p id="spread-meta" class="text-xs text-gray-500 mt-1">JST 24:00 基準の記録を集計中</p></div><span class="panel-kicker">Sales Spread</span></div>
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
        <div class="metric-row metric-row--hero"><span class="metric-label">24h平均</span><span id="avg-spread-24h" class="metric-value metric-value--hero">-</span></div>
        <div class="metric-row metric-row--hero bid"><span class="metric-label">最大スプレッド</span><span id="widest-spread" class="metric-value metric-value--hero text-green-300">-</span></div>
        <div class="metric-row metric-row--hero ask"><span class="metric-label">記録銘柄</span><span id="spread-count" class="metric-value metric-value--hero text-red-300">-</span></div>
        <div class="metric-row metric-row--hero">
          <label for="spread-filter" class="metric-label">銘柄検索</label>
          <input id="spread-filter" class="field w-full px-2 py-1 text-xs font-mono" type="search" placeholder="BTC">
        </div>
      </div>
    </section>

    <section class="panel panel--dense">
      <div class="panel-title-row mb-3"><h2 class="panel-title">銘柄別スプレッド</h2><span class="panel-kicker">Markets</span></div>
      <div class="overflow-auto scrollbar-thin max-h-[760px]">
        <table class="data-table data-table--cards text-xs">
          <thead class="sticky"><tr><th class="text-left">銘柄</th><th class="text-left">取引所</th><th class="is-num text-right">買値</th><th class="is-num text-right">売値</th><th class="is-num text-right">現在</th><th class="is-num text-right">24h平均</th><th class="is-num text-right">7日平均</th><th class="is-num text-right">30日平均</th></tr></thead>
          <tbody id="sales-spread-tbody"><tr><td colspan="8" class="text-center text-gray-500 py-4">読み込み中</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="border-t border-gray-800 px-6 py-2 text-xs text-gray-600 text-center">Japan クリプト インフォメーション | 販売所価格はJPY建て、スプレッド率は仲値比です</footer>

  <script src="js/formatter.js?v=sales-spread-1"></script>
  <script src="js/sales-spread.js?v=sales-spread-2"></script>
</body>
</html>
