<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出来高シェア | Japan クリプト インフォメーション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="terminal-body bg-gray-950 text-gray-200 min-h-screen">
  <a href="#main" class="sr-only focus:not-sr-only skip-link">メインコンテンツへスキップ</a>
  <header class="topbar px-6 py-3">
    <div class="brand-cluster">
      <div class="brand-mark" aria-hidden="true">₿</div>
      <div class="brand-copy min-w-0">
        <h1 class="page-title">Japan クリプト インフォメーション</h1>
        <div class="brand-subtitle">国内取引所 出来高シェア</div>
      </div>
    </div>
    <nav class="nav-menu" aria-label="ページ間ナビゲーション">
      <a class="nav-link" href="/">板シミュレーター</a>
      <a class="nav-link is-active" href="/volume-share" aria-current="page">出来高シェア</a>
      <a class="nav-link" href="/sales-spread">販売所スプレッド</a>
    </nav>
    <div class="status-cluster" role="status" aria-live="polite" aria-atomic="true"><span class="badge badge--live">LIVE</span><span id="share-status" class="status-text">読み込み中</span><span class="text-xs text-gray-600 ml-2">更新: <span id="share-updated-at" class="text-gray-400">-</span></span></div>
  </header>

  <main id="main" class="dashboard-shell flex flex-col gap-4 p-4 max-w-[1920px] mx-auto">
    <section class="panel panel--dense">
      <div class="panel-title-row mb-4"><div><h2 class="panel-title">出来高シェア</h2><p id="share-meta" class="text-xs text-gray-500 mt-1">JST 24:00 基準の記録を集計中</p></div><span class="panel-kicker">Volume Share</span></div>
      <div class="tab-group mb-4" role="tablist" aria-label="集計期間"><button class="btn btn-tab window-tab active" data-window="1d" type="button" role="tab" aria-selected="true">24時間</button><button class="btn btn-tab window-tab" data-window="7d" type="button" role="tab" aria-selected="false">7日間</button><button class="btn btn-tab window-tab" data-window="30d" type="button" role="tab" aria-selected="false">30日間</button></div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div class="metric-row metric-row--hero"><span class="metric-label">総出来高</span><span id="total-volume" class="metric-value metric-value--hero">-</span></div>
        <div class="metric-row metric-row--hero bid"><span class="metric-label">首位取引所</span><span id="top-exchange" class="metric-value metric-value--hero text-green-300">-</span></div>
        <div class="metric-row metric-row--hero ask"><span class="metric-label">銘柄数</span><span id="instrument-count" class="metric-value metric-value--hero text-red-300">-</span></div>
      </div>
    </section>

    <div class="grid grid-cols-1 xl:grid-cols-[420px_1fr] gap-4">
      <section class="panel panel--dense">
        <div class="panel-title-row mb-3"><h2 class="panel-title">取引所別シェア</h2><span class="panel-kicker">Exchange</span></div>
        <div class="overflow-auto scrollbar-thin">
          <table class="data-table text-xs">
            <thead class="sticky"><tr><th class="text-left">取引所</th><th class="is-num text-right">出来高</th><th class="is-num text-right">シェア</th></tr></thead>
            <tbody id="exchange-share-tbody"><tr><td colspan="3" class="text-center text-gray-500 py-4">読み込み中</td></tr></tbody>
          </table>
        </div>
      </section>

      <section class="panel panel--dense">
        <div class="panel-title-row mb-3"><h2 class="panel-title">銘柄別シェア</h2><span class="panel-kicker">Markets</span></div>
        <div class="overflow-auto scrollbar-thin max-h-[680px]">
          <table class="data-table text-xs">
            <thead class="sticky"><tr><th class="text-left">銘柄</th><th class="text-left">取引所</th><th class="is-num text-right">出来高</th><th class="is-num text-right">銘柄内シェア</th><th class="is-num text-right">全体シェア</th></tr></thead>
            <tbody id="instrument-share-tbody"><tr><td colspan="5" class="text-center text-gray-500 py-4">読み込み中</td></tr></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <footer class="border-t border-gray-800 px-6 py-2 text-xs text-gray-600 text-center">Japan クリプト インフォメーション | 出来高はJPY換算、推定値を含みます</footer>

  <script src="js/formatter.js?v=volume-share-1"></script>
  <script src="js/volume-share.js?v=volume-share-1"></script>
</body>
</html>
