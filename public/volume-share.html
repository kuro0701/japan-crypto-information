<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出来高シェア | Japan クリプト インフォメーション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="terminal-body bg-gray-950 text-gray-200 min-h-screen">
  <header class="topbar border-b border-gray-800 px-6 py-3 flex items-center justify-between">
    <div class="brand-cluster flex items-center gap-3 min-w-0">
      <div class="brand-mark" aria-hidden="true">₿</div>
      <div class="brand-copy min-w-0">
        <h1 class="text-lg font-bold text-white">Japan クリプト インフォメーション</h1>
        <div class="text-xs text-gray-500">国内取引所 出来高シェア</div>
      </div>
      <a class="nav-link text-xs font-bold" href="/">板シミュレーター</a>
      <a class="nav-link text-xs font-bold" href="/admin/analytics">アクセス解析</a>
    </div>
    <div class="status-cluster flex items-center gap-2">
      <div class="w-3 h-3 rounded-full bg-green-500"></div>
      <span id="share-status" class="text-xs text-gray-400">読み込み中</span>
      <span class="text-xs text-gray-600 ml-2">更新: <span id="share-updated-at" class="text-gray-400">-</span></span>
    </div>
  </header>

  <main class="dashboard-shell flex flex-col gap-4 p-4 max-w-[1920px] mx-auto">
    <section class="panel bg-gray-900 border border-gray-800 rounded-lg p-4">
      <div class="panel-title-row mb-4">
        <div>
          <h2 class="text-sm font-semibold text-gray-300">出来高シェア</h2>
          <p id="share-meta" class="text-xs text-gray-500 mt-1">JST 24:00 基準の記録を集計中</p>
        </div>
        <span class="panel-kicker">VOLUME SHARE</span>
      </div>

      <div class="flex flex-wrap gap-2 mb-4" role="tablist" aria-label="集計期間">
        <button class="window-tab active rounded text-xs font-bold" data-window="1d" type="button">24時間</button>
        <button class="window-tab rounded text-xs font-bold" data-window="7d" type="button">7日間</button>
        <button class="window-tab rounded text-xs font-bold" data-window="30d" type="button">30日間</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div class="metric-row primary">
          <span class="text-gray-500 text-xs">総出来高</span>
          <span id="total-volume" class="font-mono text-yellow-300 text-sm">-</span>
        </div>
        <div class="metric-row bid">
          <span class="text-gray-500 text-xs">首位取引所</span>
          <span id="top-exchange" class="font-mono text-green-300 text-sm">-</span>
        </div>
        <div class="metric-row ask">
          <span class="text-gray-500 text-xs">銘柄数</span>
          <span id="instrument-count" class="font-mono text-red-300 text-sm">-</span>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 xl:grid-cols-[420px_1fr] gap-4">
      <section class="panel bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div class="panel-title-row mb-3">
          <h2 class="text-sm font-semibold text-gray-300">取引所別シェア</h2>
          <span class="panel-kicker">EXCHANGE</span>
        </div>
        <div class="overflow-auto scrollbar-thin">
          <table class="w-full text-xs">
            <thead class="sticky">
              <tr class="text-gray-500 border-b border-gray-800">
                <th class="px-3 py-2 text-left">取引所</th>
                <th class="px-3 py-2 text-right">出来高</th>
                <th class="px-3 py-2 text-right">シェア</th>
              </tr>
            </thead>
            <tbody id="exchange-share-tbody">
              <tr><td colspan="3" class="text-center text-gray-500 py-4">読み込み中</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div class="panel-title-row mb-3">
          <h2 class="text-sm font-semibold text-gray-300">銘柄別シェア</h2>
          <span class="panel-kicker">MARKETS</span>
        </div>
        <div class="overflow-auto scrollbar-thin max-h-[680px]">
          <table class="w-full text-xs">
            <thead class="sticky">
              <tr class="text-gray-500 border-b border-gray-800">
                <th class="px-3 py-2 text-left">銘柄</th>
                <th class="px-3 py-2 text-left">取引所</th>
                <th class="px-3 py-2 text-right">出来高</th>
                <th class="px-3 py-2 text-right">銘柄内シェア</th>
                <th class="px-3 py-2 text-right">全体シェア</th>
              </tr>
            </thead>
            <tbody id="instrument-share-tbody">
              <tr><td colspan="5" class="text-center text-gray-500 py-4">読み込み中</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <footer class="border-t border-gray-800 px-6 py-2 text-xs text-gray-600 text-center">
    Japan クリプト インフォメーション | 出来高はJPY換算、推定値を含みます
  </footer>

  <script src="js/formatter.js?v=volume-share-1"></script>
  <script src="js/volume-share.js?v=volume-share-1"></script>
</body>
</html>
