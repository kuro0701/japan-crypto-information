<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Japan クリプト インフォメーション</title>
  <desc id="desc">日本の暗号資産取引所データを可視化するサイトのOGP画像</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d2a2c" stroke-width="1" opacity="0.55"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1214"/>
      <stop offset="0.52" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#04070a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35c8d2"/>
      <stop offset="1" stop-color="#35e0a5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.9"/>
  <circle cx="1035" cy="115" r="210" fill="#35c8d2" opacity="0.08"/>
  <circle cx="1075" cy="520" r="250" fill="#35e0a5" opacity="0.06"/>
  <circle cx="118" cy="92" r="42" fill="#f4c95d"/>
  <circle cx="118" cy="92" r="34" fill="#111111"/>
  <text x="118" y="113" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#f4c95d">₿</text>
  <text x="178" y="83" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#f2f7f4">Japan クリプト</text>
  <text x="178" y="119" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#c9d3cd">インフォメーション</text>
  <rect x="88" y="172" width="1024" height="1" fill="#c8dcd2" opacity="0.18"/>
  <text x="88" y="262" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800" fill="#f2f7f4">暗号資産取引所データを</text>
  <text x="88" y="337" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800" fill="#f2f7f4">見やすく、比べやすく。</text>
  <rect x="88" y="390" width="580" height="72" rx="8" fill="#101719" stroke="#244145"/>
  <text x="122" y="435" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#35c8d2">Order Book</text>
  <text x="320" y="435" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#35e0a5">Volume</text>
  <text x="480" y="435" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#ff6b70">Spread</text>
  <path d="M760 448 C820 370 880 395 930 320 S1040 240 1110 268" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="760" cy="448" r="10" fill="#35c8d2"/>
  <circle cx="930" cy="320" r="10" fill="#35e0a5"/>
  <circle cx="1110" cy="268" r="10" fill="#f4c95d"/>
  <text x="88" y="545" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#9aa6a1">japan-crypto-information.onrender.com</text>
