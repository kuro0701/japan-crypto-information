    <path d="M99 302 A150 150 0 0 1 170 20" fill="none" stroke="#f4c95d" stroke-width="34" stroke-linecap="round"/>
    <text x="170" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#f2f7f4">Liquidity</text>
    <text x="170" y="199" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#9aa6a1">Share</text>
