<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">国内暗号資産取引所 出来高シェア比較</title>
  <desc id="desc">国内主要取引所の出来高シェアを可視化するページのOGP画像</desc>
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="#0d1214" opacity="0.72"/>
  <g opacity="0.45" stroke="#1d2a2c">
    <path d="M0 90H1200M0 180H1200M0 270H1200M0 360H1200M0 450H1200M0 540H1200"/>
    <path d="M120 0V630M240 0V630M360 0V630M480 0V630M600 0V630M720 0V630M840 0V630M960 0V630M1080 0V630"/>
  </g>
  <text x="86" y="110" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#35c8d2">出来高シェア</text>
  <text x="86" y="214" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800" fill="#f2f7f4">国内暗号資産取引所</text>
  <text x="86" y="289" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800" fill="#f2f7f4">出来高シェア比較</text>
