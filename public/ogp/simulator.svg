<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">成行注文シミュレーター</title>
  <desc id="desc">BTC・ETH国内取引所リアルタイム板を使うシミュレーターのOGP画像</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1d2a2c" stroke-width="1" opacity="0.55"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1214"/>
      <stop offset="0.55" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#04070a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.9"/>
  <rect x="72" y="70" width="1056" height="490" rx="8" fill="#0d1214" stroke="#26383b"/>
  <text x="104" y="124" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#35c8d2">成行注文シミュレーター</text>
  <text x="104" y="225" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800" fill="#f2f7f4">BTC・ETH国内取引所</text>
  <text x="104" y="300" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800" fill="#f2f7f4">リアルタイム板</text>
  <text x="104" y="360" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#c9d3cd">執行価格・スリッページ・マーケットインパクトを確認</text>
  <rect x="104" y="425" width="214" height="58" rx="8" fill="#35e0a5" opacity="0.16" stroke="#35e0a5"/>
  <text x="132" y="463" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#35e0a5">BUY depth</text>
  <rect x="344" y="425" width="214" height="58" rx="8" fill="#ff6b70" opacity="0.14" stroke="#ff6b70"/>
  <text x="372" y="463" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ff6b70">SELL depth</text>
  <g transform="translate(690 152)">
    <line x1="0" y1="350" x2="370" y2="350" stroke="#c8dcd2" opacity="0.2"/>
    <line x1="0" y1="0" x2="0" y2="350" stroke="#c8dcd2" opacity="0.2"/>
    <path d="M0 320 L60 292 L120 250 L185 205 L255 130 L340 58" fill="none" stroke="#35e0a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M0 330 L64 318 L130 300 L200 260 L280 225 L370 198" fill="none" stroke="#ff6b70" stroke-width="10" stroke-linecap="round"/>
    <circle cx="255" cy="130" r="10" fill="#35e0a5"/>
    <circle cx="280" cy="225" r="10" fill="#ff6b70"/>
    <text x="18" y="44" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#9aa6a1">Order Book Curve</text>
  </g>
  <text x="104" y="526" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#9aa6a1">OKJ・Coincheck・bitFlyer・bitbank・GMOコイン・Binance Japan</text>
